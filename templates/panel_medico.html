{% extends 'base.html' %}
{% block content %}
<div class="card p-4 shadow border-primary">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-primary fw-bold">Agenda de Pacientes</h2>
        <button onclick="window.print()" class="btn btn-dark">Imprimir Agenda</button>
    </div>
    <table class="table table-striped">
        <thead class="table-dark">
            <tr>
                <th>Fecha</th>
                <th>Hora</th>
                <th>Nombre del Paciente</th>
                <th>Estado</th>
            </tr>
        </thead>
        <tbody>
            {% for c in citas %}
            <tr>
                <td>{{ c.fecha }}</td>
                <td>{{ c.hora }}</td>
                <td>{{ c.paciente }}</td>
                <td><span class="badge bg-success">Agendado</span></td>
            </tr>
            {% else %}
            <tr><td colspan="4" class="text-center">No hay turnos para hoy.</td></tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
