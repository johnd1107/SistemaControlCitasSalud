{% extends 'base.html' %}
{% block content %}
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-primary"><i class="bi bi-people-fill me-2"></i>Control de Cuentas</h2>
        <a href="{{ url_for('index') }}" class="btn btn-outline-secondary fw-bold">
            <i class="bi bi-house-door"></i> Volver al Inicio
        </a>
    </div>

    <div class="row">
        <div class="col-md-4">
            <div class="card shadow-sm border-0 mb-4">
                <div class="card-header bg-primary text-white">Registrar Nuevo Médico</div>
                <div class="card-body">
                    <form action="/admin_usuarios" method="POST">
                        <input type="text" name="ced_m" class="form-control mb-2" placeholder="Cédula" required>
                        <input type="text" name="nom_m" class="form-control mb-2" placeholder="Nombre completo" required>
                        <input type="text" name="esp_m" class="form-control mb-3" placeholder="Especialidad (Ej: Medicina General)" required>
                        <button type="submit" class="btn btn-primary w-100 fw-bold">Guardar Especialista</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card shadow-sm border-0 p-3">
                <ul class="nav nav-tabs mb-3">
                    <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#m">Médicos</button></li>
                    <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#p">Pacientes</button></li>
                </ul>
                <div class="tab-content">
                    <div class="tab-pane fade show active" id="m">
                        <table class="table table-hover">
                            <thead><tr><th>Médico</th><th>Especialidad</th></tr></thead>
                            <tbody>
                                {% for m in medicos %}
                                <tr><td>{{ m.nombre }}</td><td><span class="badge bg-info">{{ m.especialidad }}</span></td></tr>
                                {% endfor %}
                            </tbody>
                        </table>
                    </div>
                    <div class="tab-pane fade" id="p">
                        <table class="table table-hover">
                            <thead><tr><th>Paciente</th><th>Ubicación</th></tr></thead>
                            <tbody>
                                {% for p in pacientes %}
                                <tr><td>{{ p.nombre }}</td><td>{{ p.domicilio }}</td></tr>
                                {% endfor %}
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
