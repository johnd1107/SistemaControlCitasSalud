<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ticket de Turno - Salud+</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        .ticket { border: 2px dashed #000; padding: 20px; display: inline-block; width: 300px; }
        h2 { color: #007bff; margin-bottom: 5px; }
        .info { text-align: left; margin-top: 15px; }
        .btn-print { margin-top: 20px; padding: 10px; background: #28a745; color: white; border: none; cursor: pointer; }
        @media print { .btn-print { display: none; } }
    </style>
</head>
<body>
    <div class="ticket">
        <h2>SALUD+</h2>
        <p>Comprobante de Turno</p>
        <hr>
        <div class="info">
            <p><strong>Paciente:</strong> {{ cita.paciente }}</p>
            <p><strong>Médico:</strong> {{ cita.medico }}</p>
            <p><strong>Especialidad:</strong> {{ cita.especialidad }}</p>
            <p><strong>Fecha:</strong> {{ cita.fecha }}</p>
            <p><strong>Hora:</strong> {{ cita.hora }}</p>
        </div>
        <hr>
        <p>Por favor llegue 10 min antes.</p>
        <button class="btn-print" onclick="window.print()">Imprimir Ticket</button>
    </div>
</body>
</html>
