<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SaludPlus</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background: #f4f7f6; height: 100vh; display: flex; align-items: center; }
        .card-login { width: 100%; max-width: 400px; border-radius: 20px; border: none; }
        .btn-cyan { background-color: #00bcd4; color: white; border-radius: 10px; }
        .btn-cyan:hover { background-color: #00acc1; color: white; }
        .icon-box { font-size: 3rem; color: #00bcd4; }
    </style>
</head>
<body>
    <div class="container d-flex justify-content-center">
        <div class="card card-login shadow-lg p-4">
            <div class="text-center mb-4">
                <div class="icon-box"><i class="bi bi-hospital"></i></div>
                <h3 class="fw-bold">SALUDPLUS</h3>
                <p class="text-muted">Ingrese sus credenciales</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}
                {% for category, message in messages %}
                  <div class="alert alert-{{ category }} py-2 small">{{ message }}</div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <form action="{{ url_for('login') }}" method="POST">
                <div class="mb-3">
                    <label class="form-label small fw-bold">Cédula o Usuario</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0"><i class="bi bi-person"></i></span>
                        <input type="text" name="cedula" class="form-control border-start-0" placeholder="Ej: 1725..." required>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label small fw-bold">Contraseña</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0"><i class="bi bi-lock"></i></span>
                        <input type="password" name="password" class="form-control border-start-0" placeholder="••••••••" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-cyan w-100 fw-bold py-2 shadow-sm">Entrar al Sistema</button>
            </form>
            
            <div class="text-center mt-4">
                <a href="{{ url_for('registro') }}" class="text-decoration-none small text-info">¿No tienes cuenta? Regístrate aquí</a>
            </div>
        </div>
    </div>
</body>
</html>
