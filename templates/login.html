{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4 mt-5">
        <div class="card p-4 shadow border-0">
            <h3 class="text-center text-primary fw-bold mb-4">Salud+ Acceso</h3>
            <form action="/login" method="POST">
                <div class="mb-3">
                    <label class="form-label fw-bold">Usuario o Cédula:</label>
                    <input type="text" name="cedula" class="form-control" placeholder="admin / tu cédula" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Contraseña:</label>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 fw-bold">Ingresar</button>
            </form>
            <hr>
            <div class="text-center">
                <a href="/registro_paciente" class="small text-decoration-none">¿Nuevo paciente? Regístrate aquí</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
