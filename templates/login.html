{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 85vh;">
    <div class="col-md-4">
        <div class="card shadow-lg p-4">
            <div class="text-center mb-4">
                <div class="display-4 text-info"><i class="bi bi-person-circle"></i></div>
                <h3 class="fw-bold">Acceso al Sistema</h3>
                <p class="text-muted small">Ingrese sus credenciales de médico</p>
            </div>
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label small fw-bold">Número de Cédula</label>
                    <input type="text" name="cedula" class="form-control form-control-lg bg-light border-0" placeholder="0000000000" required>
                </div>
                <div class="mb-4">
                    <label class="form-label small fw-bold">Contraseña</label>
                    <input type="password" name="password" class="form-control form-control-lg bg-light border-0" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 mb-3">Entrar al Panel</button>
            </form>
            <div class="text-center">
                <p class="small text-muted">¿Eres nuevo médico? <a href="{{ url_for('registro') }}" class="text-info fw-bold text-decoration-none">Regístrate aquí</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
