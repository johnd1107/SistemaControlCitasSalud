{% extends "base.html" %}

{% block content %}
<div style="max-width: 400px; margin: 50px auto; background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);">
    <h2 style="text-align: center; color: #2c3e50; margin-top: 0;">Iniciar Sesión</h2>
    <form method="POST">
        <label style="display: block; margin-bottom: 5px; color: #2c3e50; font-weight: bold;">Email:</label>
        <input type="email" name="email" required style="width: 100%; padding: 10px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box;">

        <label style="display: block; margin-bottom: 5px; color: #2c3e50; font-weight: bold;">Contraseña:</label>
        <input type="password" name="password" required style="width: 100%; padding: 10px; margin-bottom: 25px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box;">

        <button type="submit" style="width: 100%; background: #2c3e50; color: white; padding: 12px; border: none; border-radius: 5px; font-size: 1em; cursor: pointer;">Ingresar</button>
    </form>
</div>
{% endblock %}
