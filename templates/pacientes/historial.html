{% extends 'base.html' %}
{% block content %}
<div class="container py-4">
    <div class="row">
        <div class="col-md-5">
            <div class="card p-4 shadow-sm border-0 bg-light">
                <h4 class="text-primary">Nueva Atención: {{ paciente.nombre_p }}</h4>
                <form method="POST">
                    <textarea name="diag" class="form-control mb-3" placeholder="Diagnóstico médico..." rows="4" required></textarea>
                    <textarea name="rece" class="form-control mb-3" placeholder="Receta y dosis..." rows="4" required></textarea>
                    <button type="submit" class="btn btn-primary w-100">Guardar Consulta</button>
                </form>
            </div>
        </div>
        <div class="col-md-7">
            <h4 class="fw-bold">Historial Clínico</h4>
            {% for e in entradas %}
            <div class="card mb-3 p-3 border-start border-primary border-4">
                <div class="d-flex justify-content-between">
                    <small class="text-muted">{{ e.fecha }}</small>
                    <span class="badge bg-info text-dark">Atendido por: {{ e.med }}</span>
                </div>
                <p class="mt-2"><strong>Diagnóstico:</strong> {{ e.diagnostico }}</p>
                <p class="mb-0 text-secondary"><strong>Receta:</strong> {{ e.receta }}</p>
            </div>
            {% endfor %}
        </div>
    </div>
</div>
{% endblock %}
