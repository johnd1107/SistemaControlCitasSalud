{% extends 'base.html' %}
{% block content %}
<div class="card p-4 shadow">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-primary fw-bold">Mis Citas Médicas</h2>
        <div>
            <button onclick="window.print()" class="btn btn-secondary me-2">Imprimir Lista</button>
            <a href="/agendar" class="btn btn-primary fw-bold">+ Agendar Turno</a>
        </div>
    </div>
    <table class="table table-hover">
        <thead class="table-primary">
            <tr>
                <th>Fecha</th>
                <th>Hora</th>
                <th>Médico / Especialidad</th>
                <th>Estado</th>
            </tr>
        </thead>
        <tbody>
            {% for c in citas %}
            <tr>
                <td>{{ c.fecha }}</td>
                <td>{{ c.hora }}</td>
                <td>{{ c.medico }} ({{ c.especialidad }})</td>
                <td><span class="badge bg-info text-dark">{{ c.estado }}</span></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
