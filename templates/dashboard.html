{% extends 'base.html' %}
{% block content %}
<div class="card p-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-primary fw-bold">Mis Turnos Agendados</h2>
        <a href="/agendar" class="btn btn-primary fw-bold">+ Agendar Nueva Cita</a>
    </div>
    <table class="table table-hover">
        <thead class="table-primary">
            <tr>
                <th>Fecha/Hora</th>
                <th>Médico</th>
                <th>Especialidad</th>
                <th>Estado</th>
            </tr>
        </thead>
        <tbody>
            {% for c in citas %}
            <tr>
                <td>{{ c.fecha }} - {{ c.hora }}</td>
                <td>{{ c.medico }}</td>
                <td>{{ c.especialidad }}</td>
                <td><span class="badge bg-info text-dark">{{ c.estado }}</span></td>
            </tr>
            {% else %}
            <tr><td colspan="4" class="text-center">No tienes turnos agendados.</td></tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
