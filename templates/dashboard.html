{% extends 'base.html' %}
{% block content %}
<div class="row">
    {% if session['rol'] == 'admin' %}
    <div class="col-md-4 mb-4">
        <div class="card p-4 border-0 shadow-sm text-center">
            <i class="bi bi-person-workspace fs-1 text-primary"></i>
            <h5 class="fw-bold mt-3">Gestionar Médicos</h5>
            <a href="{{ url_for('lista_medicos') }}" class="btn btn-primary btn-sm mt-2">Ver Lista</a>
        </div>
    </div>
    {% endif %}

    <div class="col-md-4 mb-4">
        <div class="card p-4 border-0 shadow-sm text-center">
            <i class="bi bi-people-fill fs-1 text-info"></i>
            <h5 class="fw-bold mt-3">Pacientes</h5>
            <a href="{{ url_for('pacientes') }}" class="btn btn-info btn-sm text-white mt-2">Ver Lista</a>
        </div>
    </div>

    {% if session['rol'] == 'admin' %}
    <div class="col-md-4 mb-4">
        <div class="card p-4 border-0 shadow-sm text-center bg-light">
            <i class="bi bi-file-earmark-pdf fs-1 text-danger"></i>
            <h5 class="fw-bold mt-3">Reporte de Pacientes</h5>
            <a href="{{ url_for('reporte_lista', tipo='pacientes') }}" class="btn btn-outline-danger btn-sm mt-2">Imprimir Todo</a>
        </div>
    </div>
    {% endif %}
</div>
{% endblock %}
