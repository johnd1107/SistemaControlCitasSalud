<!DOCTYPE html>
<html lang="es">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style> @media print { .no-print { display: none; } } </style>
</head>
<body onload="window.print()">
    <div class="container mt-5 p-4 border shadow-sm" style="max-width: 700px;">
        <div class="text-center">
            <h2 class="text-primary fw-bold">SALUD+ - RECETA MÉDICA</h2>
            <hr>
        </div>
        <div class="mb-4">
            <p><strong>Paciente:</strong> {{ d.nom_p }}</p>
            <p><strong>Médico:</strong> {{ session['nombre'] }}</p>
        </div>
        <div class="mb-4">
            <h5>Diagnóstico:</h5>
            <div class="p-3 bg-light rounded">{{ d.diag }}</div>
        </div>
        <div class="mb-4">
            <h5>Indicaciones / Medicación:</h5>
            <div class="p-3 bg-light rounded" style="white-space: pre-wrap;">{{ d.rece }}</div>
        </div>
        <div class="text-center mt-5 no-print">
            <button onclick="window.print()" class="btn btn-primary">Imprimir de nuevo</button>
            <a href="/" class="btn btn-secondary">Volver al Inicio</a>
        </div>
    </div>
</body>
</html>
