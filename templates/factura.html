{% extends 'base.html' %}
{% block content %}
<div class="card shadow">
    <div class="card-header bg-dark text-white">
        <h2>🧾 Generar Nueva Factura</h2>
    </div>
    <div class="card-body">
        <form>
            <div class="row mb-3">
                <div class="col">
                    <label>Cliente / Paciente</label>
                    <input type="text" class="form-control" placeholder="Nombre completo">
                </div>
                <div class="col">
                    <label>Fecha</label>
                    <input type="date" class="form-control">
                </div>
            </div>
            <table class="table">
                <thead>
                    <tr><th>Servicio/Producto</th><th>Cantidad</th><th>Precio</th></tr>
                </thead>
                <tbody>
                    <tr>
                        <td><input type="text" class="form-control" placeholder="Consulta Médica"></td>
                        <td><input type="number" class="form-control" value="1"></td>
                        <td><input type="text" class="form-control" placeholder="0.00"></td>
                    </tr>
                </tbody>
            </table>
            <button type="button" class="btn btn-success">Imprimir Factura</button>
        </form>
    </div>
</div>
{% endblock %}
