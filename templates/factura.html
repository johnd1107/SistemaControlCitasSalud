<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Generar Factura - SaludPlus</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light py-5">
    <div class="container shadow p-5 bg-white" style="max-width: 800px; border-top: 10px solid #800040;">
        <div class="row mb-4">
            <div class="col-6">
                <h2 class="fw-bold">SALUDPLUS</h2>
                <p>Centro Médico Profesional<br>Quito - Ecuador</p>
            </div>
            <div class="col-6 text-end">
                <h3 class="text-muted">COMPROBANTE</h3>
                <p>Nro: {{ f.nro }}<br>Fecha: {{ f.fecha }}</p>
            </div>
        </div>
        <hr>
        <table class="table table-bordered">
            <thead class="table-light">
                <tr><th>Descripción</th><th class="text-end">Importe</th></tr>
            </thead>
            <tbody>
                <tr><td>Consulta Médica de Especialidad</td><td class="text-end">$ 45.00</td></tr>
                <tr><td>IVA 12%</td><td class="text-end">$ 5.40</td></tr>
            </tbody>
        </table>
        <div class="text-end mt-4">
            <h4 class="fw-bold">TOTAL A PAGAR: $ {{ f.total }}</h4>
        </div>
        <div class="mt-5 text-center">
            <button onclick="window.print()" class="btn btn-dark px-4">Imprimir</button>
            <a href="/" class="btn btn-outline-secondary">Regresar al Inicio</a>
        </div>
    </div>
</body>
</html>
