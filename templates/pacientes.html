{% extends 'base.html' %}
{% block content %}
<div class="row">
    <div class="col-lg-4">
        <div class="card p-4 mb-4">
            <h5 class="fw-bold mb-3"><i class="bi bi-person-plus-fill text-info"></i> Nuevo Registro</h5>
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label small fw-bold">Cédula del Paciente</label>
                    <input type="text" name="ced" class="form-control bg-light" placeholder="Ej: 1723456789" required>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold">Nombre Completo</label>
                    <input type="text" name="nom" class="form-control bg-light" placeholder="Nombres y Apellidos" required>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold">Teléfono de Contacto</label>
                    <input type="text" name="tel" class="form-control bg-light" placeholder="0987654321">
                </div>
                <button type="submit" class="btn btn-primary w-100 shadow-sm">Guardar Paciente</button>
            </form>
        </div>
    </div>

    <div class="col-lg-8">
        <div class="card p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h5 class="fw-bold m-0"><i class="bi bi-journal-medical text-info"></i> Listado de Pacientes</h5>
                <span class="badge bg-secondary">{{ pacientes|length }} Registrados</span>
            </div>
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>Identificación</th>
                            <th>Paciente</th>
                            <th class="text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for p in pacientes %}
                        <tr>
                            <td class="fw-bold text-muted">{{ p.cedula_p }}</td>
                            <td>{{ p.nombre_p }}</td>
                            <td class="text-center">
                                <a href="{{ url_for('historial', id_p=p.id_paciente) }}" class="btn btn-sm btn-light border">
                                    <i class="bi bi-eye"></i> Historial
                                </a>
                                {% if session['rol'] == 'admin' %}
                                <a href="{{ url_for('eliminar_paciente', id=p.id_paciente) }}"
                                   class="btn btn-sm btn-outline-danger"
                                   onclick="return confirm('¿Está seguro de eliminar este registro?')">
                                    <i class="bi bi-trash"></i>
                                </a>
                                {% endif %}
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}
