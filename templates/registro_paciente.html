<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Paciente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .card-registro {
            max-width: 400px;
            width: 100%;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<div class="card-registro">
    <h3 class="text-center mb-4">Registro de Paciente</h3>

    <form method="POST" action="/registro_paciente">
        <div class="mb-3">
            <label class="form-label">Cédula:</label>
            <input type="text" name="cedula" class="form-control" placeholder="Ingrese su cédula" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Nombre Completo:</label>
            <input type="text" name="nombre" class="form-control" placeholder="Ej: Juan Pérez" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Contraseña:</label>
            <input type="password" name="password" class="form-control" placeholder="********" required>
        </div>
        <button type="submit" class="btn btn-success w-100">Registrarse</button>

        <div class="mt-3 text-center">
            <a href="/" class="text-decoration-none small">Volver al login</a>
        </div>
    </form>
</div>

</body>
</html>
