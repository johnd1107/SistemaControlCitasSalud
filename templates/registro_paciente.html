{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow border-0 rounded-4 p-4">
            <h3 class="text-center fw-bold text-primary mb-4">Registro de Paciente</h3>
            <form action="/registro_paciente" method="POST">
                <input type="text" name="ced" class="form-control mb-2" placeholder="Cédula" required>
                <input type="text" name="nom" class="form-control mb-2" placeholder="Nombre completo" required>
                <input type="password" name="pass" class="form-control mb-2" placeholder="Contraseña" required>
                <div class="row mb-4">
                    <div class="col-4"><input type="number" name="edad" class="form-control" placeholder="Edad" required></div>
                    <div class="col-8"><input type="text" name="dir" class="form-control" placeholder="Dirección" required></div>
                </div>
                <button type="submit" class="btn btn-primary w-100 fw-bold">Registrar mi cuenta</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
