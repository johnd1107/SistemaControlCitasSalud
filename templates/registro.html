<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registrar Paciente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="height: 100vh;">
    <div class="container" style="max-width: 500px;">
        <div class="card shadow p-4">
            <h3 class="text-center mb-4">Nuevo Paciente</h3>
            <form action="/registrar" method="POST">
                <input type="text" name="nombre" placeholder="Nombre" class="form-control mb-3" required>
                <input type="text" name="apellido" placeholder="Apellido" class="form-control mb-3" required>
                <input type="text" name="cedula" placeholder="Cédula" class="form-control mb-3" maxlength="10" required>
                <input type="text" name="telefono" placeholder="Teléfono" class="form-control mb-3">
                <input type="email" name="email" placeholder="Correo Electrónico" class="form-control mb-3">
                <button type="submit" class="btn btn-primary w-100">Guardar</button>
                <a href="/" class="btn btn-link w-100 mt-2">Cancelar</a>
            </form>
        </div>
    </div>
</body>
</html>
