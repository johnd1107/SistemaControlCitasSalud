<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="height: 100vh;">
    <div class="container card shadow p-4" style="max-width: 400px;">
        <h3 class="text-center">Registro de Médico</h3>
        <form method="POST">
            <input type="text" name="cedula" class="form-control mb-2" placeholder="Cédula" required>
            <input type="text" name="nombre" class="form-control mb-2" placeholder="Nombre Completo" required>
            <input type="password" name="password" class="form-control mb-3" placeholder="Contraseña" required>
            <button class="btn btn-primary w-100">Registrar y Salir</button>
        </form>
        <a href="{{ url_for('login') }}" class="d-block text-center mt-2 small">Regresar al Login</a>
    </div>
</body>
</html>
