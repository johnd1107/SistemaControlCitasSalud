{% extends 'base.html' %}
{% block content %}
<div class="container mt-5">
    <div class="card shadow border-0 p-4">
        <h2 class="text-primary fw-bold">Atención Médica</h2>
        <p><strong>Paciente:</strong> {{ cita.paciente }} | <strong>Cédula:</strong> {{ cita.cedula }}</p>
        <hr>
        <form method="POST">
            <label class="fw-bold">Diagnóstico Médico</label>
            <textarea name="diagnostico" class="form-control mb-3" rows="3" required></textarea>
            
            <label class="fw-bold">Receta (Medicamentos e indicaciones)</label>
            <textarea name="receta" class="form-control mb-4" rows="4" required></textarea>
            
            <button type="submit" class="btn btn-primary btn-lg w-100">Finalizar y Guardar Consulta</button>
            <a href="{{ url_for('admin_usuarios') }}" class="btn btn-link w-100 text-muted">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
