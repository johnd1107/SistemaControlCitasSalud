{% extends 'base.html' %}
{% block content %}
<div class="container mt-5">
    <div class="card shadow border-0 p-4" style="max-width: 500px; margin: auto;">
        <h3 class="text-center fw-bold text-success mb-4">Agendar mi Turno</h3>
        <form action="/agendar" method="POST">
            <div class="mb-3">
                <label class="form-label">Seleccione Médico</label>
                <select name="id_medico" class="form-select" required>
                    {% for m in medicos %}
                    <option value="{{ m.id_usuario }}">{{ m.nombre }} - {{ m.especialidad }}</option>
                    {% endfor %}
                </select>
            </div>
            <input type="hidden" name="especialidad" value="General">

            <div class="mb-3">
                <label class="form-label">Fecha</label>
                <input type="date" name="fecha" class="form-control" min="{{ hoy }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Hora</label>
                <input type="time" name="hora" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-success w-100 fw-bold">Confirmar Turno</button>
        </form>
    </div>
</div>
{% endblock %}
