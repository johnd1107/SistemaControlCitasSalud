{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 mt-4">
        <div class="card shadow p-4 border-0">
            <h3 class="text-primary fw-bold mb-4">Agendar Nueva Cita</h3>
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label fw-bold">Seleccione Médico / Especialidad:</label>
                    <select name="id_medico" class="form-select" required>
                        <option value="" disabled selected>Escoja un profesional...</option>
                        {% for m in medicos %}
                        <option value="{{ m.id_usuario }}">{{ m.nombre }} - {{ m.especialidad }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Fecha:</label>
                        <input type="date" name="fecha" class="form-control" min="{{ hoy }}" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Hora:</label>
                        <input type="time" name="hora" class="form-control" required>
                    </div>
                </div>

                <div class="mt-4 d-flex justify-content-between">
                    <a href="/" class="btn btn-light">Volver</a>
                    <button type="submit" class="btn btn-primary px-4 fw-bold">Confirmar Turno</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
