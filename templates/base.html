<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>.navbar { background-color: #0056b3; } .card { border-radius: 15px; shadow: 0 4px 8px rgba(0,0,0,0.1); }</style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark p-3 mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">🏥 SALUD+ PICHINCHA</a>
            {% if session['user_id'] is defined %}<a href="/logout" class="btn btn-outline-light btn-sm">Salir</a>{% endif %}
        </div>
    </nav>
    <div class="container">
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ category }} alert-dismissible fade show">{{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}
        {% block content %}{% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
