<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaludPlus</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        .navbar { background-color: #00bcd4 !important; }
        .card { border-radius: 15px; border: none; }
        .btn-primary { background-color: #00bcd4; border: none; }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark shadow-sm mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{{ url_for('index') }}">
                <i class="bi bi-hospital"></i> SALUDPLUS
            </a>
            <div class="d-flex align-items-center">
                <a href="{{ url_for('pacientes') }}" class="nav-link text-white me-3">
                    <i class="bi bi-people"></i> Pacientes
                </a>
                <span class="text-white me-3 border-start ps-3">| {{ session['nombre'] }}</span>
                <a href="{{ url_for('logout') }}" class="btn btn-outline-light btn-sm">Cerrar Sesión</a>
            </div>
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
