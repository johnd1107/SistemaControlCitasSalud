{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Personal Médico</h2>
    <a href="{{ url_for('imprimir_reporte', tipo='medicos') }}" class="btn btn-danger">Imprimir Médicos</a>
</div>

<div class="card shadow p-4 border-0">
    <table class="table table-hover">
        <thead class="table-primary">
            <tr>
                <th>Cédula</th>
                <th>Nombre</th>
                <th>Acción</th>
            </tr>
        </thead>
        <tbody>
            {% for m in medicos %}
            <tr>
                <td>{{ m.cedula }}</td>
                <td>Dr. {{ m.nombre }}</td>
                <td>
                    <a href="{{ url_for('eliminar_medico', id_m=m.id_usuario) }}" class="btn btn-sm btn-danger" onclick="return confirm('¿Eliminar médico?')">Eliminar</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
