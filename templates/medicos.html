{% extends 'base.html' %}
{% block content %}
<div class="card shadow border-0 p-4">
    <div class="d-flex justify-content-between mb-4">
        <h3 class="fw-bold"><i class="bi bi-person-badge-fill text-primary"></i> Personal Médico</h3>
        <a href="{{ url_for('reporte_lista', tipo='medicos') }}" class="btn btn-dark">
            <i class="bi bi-printer"></i> Imprimir Lista de Médicos
        </a>
    </div>
    <table class="table table-hover">
        <thead class="table-light">
            <tr>
                <th>Cédula</th>
                <th>Nombre del Médico</th>
                <th>Rol</th>
            </tr>
        </thead>
        <tbody>
            {% for m in medicos %}
            <tr>
                <td>{{ m.cedula }}</td>
                <td class="fw-bold">Dr. {{ m.nombre }}</td>
                <td><span class="badge bg-info">Especialista</span></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
